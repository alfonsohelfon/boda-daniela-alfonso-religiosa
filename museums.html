<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museums & Activities | Daniela y Alfonso</title>
    <style>
        @font-face {
            font-family: 'Bellissima Script';
            src: url('Fonts/BellissimaScriptRedux-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Practice';
            src: url('Fonts/Practice-Italic.otf') format('opentype');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'Practice';
            src: url('Fonts/Practice-BookItalic.otf') format('opentype');
            font-weight: 300;
            font-style: italic;
        }
        @font-face {
            font-family: 'Practice';
            src: url('Fonts/Practice-SemiBoldItalic.otf') format('opentype');
            font-weight: 600;
            font-style: italic;
        }
        @font-face {
            font-family: 'Practice';
            src: url('Fonts/Practice-BoldItalic.otf') format('opentype');
            font-weight: 700;
            font-style: italic;
        }
        @font-face {
            font-family: 'Practice';
            src: url('Fonts/Practice-ExtraBold.otf') format('opentype');
            font-weight: 800;
            font-style: normal;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            width: 100%;
            overflow-x: hidden;
            background-color: #fff8ea;
            font-family: 'Practice', Georgia, serif;
            color: #232618;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 0;
            z-index: 1000;
            background: transparent;
        }
        .nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 1.2rem 2rem;
            border-bottom: 1px solid #a79a6a;
            position: relative;
        }
        .nav-title {
            font-family: 'Bellissima Script', cursive;
            font-size: 2.5rem;
            color: #232618;
            text-decoration: none;
        }
        .nav-back {
            position: absolute;
            left: 2rem;
            font-family: 'Practice', Georgia, serif;
            font-style: italic;
            font-size: 0.95rem;
            color: #232618;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }
        .nav-back:hover { opacity: 0.6; }

        .page-content {
            padding: 8rem 2rem 5rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .section-script-title {
            font-family: 'Bellissima Script', cursive;
            font-size: 4rem;
            color: #a79a6a;
            margin-bottom: 3rem;
        }
        .museums-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        .museum-item a {
            display: block;
            font-family: 'Engravers MT', 'Copperplate', 'Copperplate Gothic Light', serif;
            font-size: 0.85rem;
            color: #232618;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 1rem 0;
            width: 100%;
            max-width: 560px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .museum-item a:hover { opacity: 0.55; }
        .section-divider {
            width: 100%;
            max-width: 560px;
            height: 1px;
            background: #ece0be;
        }

        @media (max-width: 900px) {
            .nav-title { font-size: 1.8rem; }
            .nav-back { font-size: 0.85rem; }
            .section-script-title { font-size: 2.8rem; }
        }
        @media (max-width: 600px) {
            .section-script-title { font-size: 2.2rem; }
            .nav-title { font-size: 1.5rem; }
            .museum-item a { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html#todo-tostay" class="nav-back">&larr; Back</a>
            <span class="nav-title">Museums & Activities</span>
        </div>
    </nav>

    <div class="page-content">
        <h1 class="section-script-title">Museums & Activities</h1>
        <ul class="museums-list">
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Museo+Rufino+Tamayo+Reforma+Chapultepec+Mexico+City" target="_blank" rel="noopener">Museo Rufino Tamayo</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=MUAC+Museo+Universitario+Arte+Contemporaneo+UNAM+Mexico+City" target="_blank" rel="noopener">MUAC — Museo Universitario Arte Contemporáneo</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Palacio+de+Bellas+Artes+Mexico+City" target="_blank" rel="noopener">Palacio de Bellas Artes</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Museo+Nacional+de+Antropologia+Mexico+City" target="_blank" rel="noopener">Museo Nacional de Antropología</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Museo+Frida+Kahlo+Casa+Azul+Coyoacan+Mexico+City" target="_blank" rel="noopener">Museo Frida Kahlo — Casa Azul</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Casa+Luis+Barragan+Francisco+Ramirez+12+Mexico+City" target="_blank" rel="noopener">Luis Barragán Houses</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Piramides+de+Teotihuacan+Mexico" target="_blank" rel="noopener">Pirámides de Teotihuacán</a></li>
            <div class="section-divider"></div>
            <li class="museum-item"><a href="https://www.google.com/maps/search/?api=1&query=Xochimilco+Mexico+City" target="_blank" rel="noopener">Xochimilco</a></li>
        </ul>
    </div>

</body>
</html>
